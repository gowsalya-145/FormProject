name: Selenium Test Automation

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - DEV
          - QA
          - UAT
          - PROD

      browser:
        description: "Select Browser"
        required: true
        type: choice
        options:
          - chrome
          - firefox
          - edge

      build_version:
        description: "Enter Build Version"
        required: true
        type: string

      threads:
        description: "Parallel Thread Count"
        required: true
        type: string
        default: "2"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  selenium-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify Java
        run: java -version

      - name: Verify Maven
        run: mvn -version

      - name: Display Inputs
        run: |
          echo "Environment = ${{ github.event.inputs.environment }}"
          echo "Browser = ${{ github.event.inputs.browser }}"
          echo "Build Version = ${{ github.event.inputs.build_version }}"
          echo "Threads = ${{ github.event.inputs.threads }}"

      - name: Run Selenium Tests
        run: |
          mvn clean test \
          -Dbrowser=${{ github.event.inputs.browser }}

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Setup GitHub Pages
        if: always()
        uses: actions/configure-pages@v5

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/allure-maven-plugin

      - name: Deploy Allure Report
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4