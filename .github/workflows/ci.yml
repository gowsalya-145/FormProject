name: Selenium Test Automation

on:
workflow_dispatch:
inputs:
environment:
description: "Select Environment"
required: true
default: "QA"
type: choice
options:
  - DEV
  - QA
  - UAT
  - PROD


browser:
  description: "Select Browser"
  required: true
  default: "chrome"
  type: choice
  options:
    - chrome
    - firefox
    - edge

suite:
  description: "Select Test Suite"
  required: true
  default: "smoke"
  type: choice
  options:
    - smoke
    - sanity
    - regression

threads:
  description: "Parallel Thread Count"
  required: true
  default: "2"

allure_report:
  description: "Generate Allure Report"
  required: true
  default: "yes"
  type: choice
  options:
    - yes
    - no


jobs:
selenium-test:
runs-on: ubuntu-latest
  
  ```
steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Java 17
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: '17'

  - name: Cache Maven Dependencies
    uses: actions/cache@v4
    with:
      path: ~/.m2
      key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      restore-keys: |
        ${{ runner.os }}-m2

  - name: Install Google Chrome
    uses: browser-actions/setup-chrome@v1

  - name: Display Selected Parameters
    run: |
      echo "Environment = ${{ inputs.environment }}"
      echo "Browser = ${{ inputs.browser }}"
      echo "Suite = ${{ inputs.suite }}"
      echo "Threads = ${{ inputs.threads }}"
      echo "Allure Report = ${{ inputs.allure_report }}"

  - name: Verify Java
    run: java -version

  - name: Verify Maven
    run: mvn -version

  - name: Execute Selenium Tests
    run: |
      mvn clean test \
      -Denv=${{ inputs.environment }} \
      -Dbrowser=${{ inputs.browser }} \
      -Dsuite=${{ inputs.suite }} \
      -Dthreads=${{ inputs.threads }}

  - name: Generate Allure Report
    if: always()
    run: mvn allure:report

  - name: Upload Allure Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: allure-report
      path: target/site/allure-maven-plugin

  - name: Upload TestNG Reports
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: testng-reports
      path: target/surefire-reports

